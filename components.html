<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Components | Mayela</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <!-- Commencer sur la version mobile (mobile-first) -->
    <!-- Exemple component button -->
    <section class="layout-base">
        <h2>Buttons</h2>
        <br />
        <!-- les classe flex, column, flex-start sont dans le fichier css/tools/layout -->
        <div class="flex column flex-start">
            <!-- button primary [small] -->
            <button class="button__small button-primary">Faire un don</button>

            <!-- button primary -->
            <button class="button button-primary">Faire un don</button>

            <!-- button primary [icon] -->
            <button class="button__icon button-primary">
                Découvrir notre impact
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-arrow-right-icon lucide-arrow-right">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
            </button>

            <!-- button secondary -->
            <button class="button button-secondary">Nous rejoindre</button>

            <!-- button primary [Large] -->
            <button class="button__large button-primary">S'inscrire</button>
        </div>
    </section>

    <br />
    <br />
    <!--  -->

    <section class="layout-base">
        <h2>Card</h2>
        <br />
        <!-- les classe flex, column, flex-start sont dans le fichier css/tools/layout -->
        <div class="flex column">
            <div class="card">
                <div class="card-top">
                    <div class="flex column">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="card-icon">
                            <path d="M18 11c-1.5 0-2.5.5-3 2" />
                            <path
                                d="M4 6a2 2 0 0 0-2 2v4a5 5 0 0 0 5 5 8 8 0 0 1 5 2 8 8 0 0 1 5-2 5 5 0 0 0 5-5V8a2 2 0 0 0-2-2h-3a8 8 0 0 0-5 2 8 8 0 0 0-5-2z" />
                            <path d="M6 11c1.5 0 2.5.5 3 2" />
                        </svg>
                        <h3 class="card-title">Diffusion grand public</h3>
                        <p class="card-description">Organisation de festivals,
                            projections en plein air et concerts gratuits pour animer l'espace public.</p>
                    </div>
                </div>
                <div class="card-bottom">
                    <span class="card-label">Événementiel</span>
                </div>
            </div>

            <br />

        </div>
    </section>


</body>

</html>
